server:
  port: 8000
  servlet:
    context-path: /AMQNU/api/
  tomcat:
    max-swallow-size: 50MB

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: "jdbc:mysql://localhost:3306/qnu"
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
    baseline-on-migrate: true
    out-of-order: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    time-zone: Asia/Ho_Chi_Minh
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 60000
  mail:
    host: smtp.gmail.com
    port: 587
    username: epicescapesnews@gmail.com
    password: zrtoehywklazjaui
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com

mail:
  email-host: hoangtuquy775@gmail.com

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: INFO
    org.flywaydb: INFO
    org.springdoc: DEBUG
    org.springframework.security: DEBUG

springdoc:
  api-docs:
    path: /document/api-docs
  swagger-ui:
    path: /document/swagger-ui.html

rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  cleanup-threshold: ${RATE_LIMIT_CLEANUP_THRESHOLD:2000}
  trusted-ips: ${RATE_LIMIT_TRUSTED_IPS:}
  login:
    enabled: ${RATE_LIMIT_LOGIN_ENABLED:true}
    path: ${RATE_LIMIT_LOGIN_PATH:/auth/log-in}
    max-requests: ${RATE_LIMIT_LOGIN_MAX_REQUESTS:30}
    window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
  roll-call:
    enabled: ${RATE_LIMIT_ROLL_CALL_ENABLED:true}
    path: ${RATE_LIMIT_ROLL_CALL_PATH:/attendance/roll-call}
    max-requests: ${RATE_LIMIT_ROLL_CALL_MAX_REQUESTS:20}
    window-seconds: ${RATE_LIMIT_ROLL_CALL_WINDOW_SECONDS:60}

login-attempt:
  enabled: ${LOGIN_ATTEMPT_ENABLED:true}
  max-failures: ${LOGIN_ATTEMPT_MAX_FAILURES:5}
  lock-seconds: ${LOGIN_ATTEMPT_LOCK_SECONDS:900}
  reset-window-seconds: ${LOGIN_ATTEMPT_RESET_WINDOW_SECONDS:900}